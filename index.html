<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cuenta y Selecciona - Cantutino</title>
    <style>
        :root {
            --azul-base: #1d1e3d;
            --azul-claro: #32356d;
            --blanco: #ffffff;
            --sombra: rgba(0, 0, 0, 0.5);
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--azul-base);
            /* Fondo con profundidad radial y viñeta */
            background: radial-gradient(circle at center, var(--azul-claro) 0%, var(--azul-base) 100%);
            color: var(--blanco);
            font-family: 'Segoe UI', Arial, sans-serif;
            cursor: none;
            user-select: none;
            height: 100vh;
        }

        /* Elementos de fondo desenfocados para profundidad */
        .bokeh {
            position: absolute;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            filter: blur(20px);
            z-index: 0;
            pointer-events: none;
        }

        /* Información Institucional */
        #header-info {
            position: absolute;
            top: 25px; right: 35px;
            text-align: right;
            border-right: 4px solid var(--blanco);
            padding-right: 20px;
            z-index: 2000;
        }
        #header-info h2 { margin: 0; font-size: 20px; text-transform: uppercase; }
        #header-info p { margin: 2px 0; font-size: 14px; opacity: 0.8; }

        /* Guía del Mouse */
        #mouse-visual {
            position: absolute;
            bottom: 30px; left: 30px;
            width: 70px; height: 100px;
            border: 3px solid var(--blanco);
            border-radius: 35px;
            z-index: 1000;
        }
        #click-hint {
            position: absolute;
            top: 0; left: 0; width: 50%; height: 40%;
            background: var(--blanco);
            border-radius: 30px 0 0 0;
            border-right: 1px solid var(--azul-base);
            border-bottom: 1px solid var(--azul-base);
            animation: pulse-click 1s infinite;
        }
        @keyframes pulse-click {
            0% { opacity: 1; } 50% { opacity: 0.2; } 100% { opacity: 1; }
        }

        /* Área de Juego */
        #game-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            z-index: 10;
            position: relative;
        }

        #object-area {
            height: 350px;
            width: 80%;
            position: relative;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 40px;
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-shadow: 0 20px 50px var(--sombra);
        }

        .game-item {
            font-size: 60px;
            margin: 15px;
            filter: drop-shadow(0 10px 10px var(--sombra));
            transition: transform 0.3s;
        }

        /* Opciones Numéricas */
        #options-bar {
            display: flex;
            gap: 20px;
            z-index: 20;
        }

        .number-btn {
            background: var(--blanco);
            color: var(--azul-base);
            width: 90px;
            height: 90px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
            font-weight: 900;
            border-radius: 15px;
            cursor: pointer;
            box-shadow: 0 10px 0 #bcbcbc, 0 15px 25px var(--sombra);
            transition: all 0.1s;
        }
        .number-btn:active {
            transform: translateY(8px);
            box-shadow: 0 2px 0 #bcbcbc;
        }

        /* Cantutino */
        #cantutino {
            position: absolute;
            pointer-events: none;
            z-index: 5000;
            display: flex;
            flex-direction: column;
            align-items: center;
            filter: drop-shadow(0 15px 15px var(--sombra));
        }
        .name-tag {
            background: var(--blanco);
            color: var(--azul-base);
            padding: 2px 10px;
            border-radius: 5px;
            font-weight: bold;
            font-size: 12px;
            margin-bottom: 5px;
        }

        /* Overlay */
        #msg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: var(--azul-base);
            display: none;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 6000;
        }

        #level-indicator {
            position: absolute;
            top: 30px; left: 30px;
            font-size: 24px;
            font-weight: bold;
            background: rgba(255,255,255,0.1);
            padding: 10px 25px;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div id="header-info">
        <h2>Colegio La Cantuta</h2>
        <p>Área: Computación</p>
        <p>Docente: Edilson L. H.</p>
    </div>

    <div id="level-indicator">NIVEL: <span id="lvl-val">1</span>/10</div>

    <div id="mouse-visual">
        <div id="click-hint"></div>
    </div>

    <div id="game-container">
        <h1 style="margin-bottom: 20px; font-size: 32px;">¿Cuántos hay?</h1>
        <div id="object-area"></div>
        <div id="options-bar"></div>
    </div>

    <div id="cantutino">
        <div class="name-tag">Cantutino</div>
        <div style="font-size: 65px;">🦁</div>
    </div>

    <div id="msg-overlay">
        <h1>¡EXCELENTE CONTEO!</h1>
        <p>Has superado todos los niveles.</p>
        <button onclick="location.reload()" style="padding: 15px 40px; font-size: 20px; border-radius: 50px; border: none; cursor: pointer; font-weight: bold;">Jugar de Nuevo</button>
    </div>

<script>
    const objectArea = document.getElementById('object-area');
    const optionsBar = document.getElementById('options-bar');
    const lvlTxt = document.getElementById('lvl-val');
    const cantutino = document.getElementById('cantutino');
    
    let currentLevel = 1;
    let correctCount = 0;
    const items = ["🍎", "⭐", "🦋", "🚗", "🧸", "🍦", "⚽", "🐱"];

    // Crear partículas de fondo para profundidad
    for(let i=0; i<15; i++) {
        const dot = document.createElement('div');
        dot.className = 'bokeh';
        const size = Math.random() * 150 + 50;
        dot.style.width = size + 'px';
        dot.style.height = size + 'px';
        dot.style.top = Math.random() * 100 + "%";
        dot.style.left = Math.random() * 100 + "%";
        document.body.appendChild(dot);
    }

    function initLevel() {
        objectArea.innerHTML = '';
        optionsBar.innerHTML = '';
        
        // Cantidad de objetos según nivel
        correctCount = Math.floor(Math.random() * (currentLevel + 2)) + currentLevel;
        const icon = items[Math.floor(Math.random() * items.length)];

        // Crear objetos
        for(let i=0; i<correctCount; i++) {
            const el = document.createElement('div');
            el.className = 'game-item';
            el.innerText = icon;
            // Animación suave para niveles altos
            if(currentLevel > 7) {
                el.style.animation = `float ${2+Math.random()*2}s infinite ease-in-out`;
            }
            objectArea.appendChild(el);
        }

        // Crear opciones (incluyendo la correcta)
        let choices = [correctCount];
        while(choices.length < 4) {
            let alt = Math.max(1, correctCount + Math.floor(Math.random() * 7) - 3);
            if(!choices.includes(alt)) choices.push(alt);
        }
        choices.sort((a, b) => a - b);

        choices.forEach(num => {
            const btn = document.createElement('div');
            btn.className = 'number-btn';
            btn.innerText = num;
            btn.onclick = () => checkAnswer(num);
            optionsBar.appendChild(btn);
        });
    }

    function checkAnswer(selected) {
        if(selected === correctCount) {
            if(currentLevel < 10) {
                currentLevel++;
                lvlTxt.innerText = currentLevel;
                // Efecto visual de acierto
                objectArea.style.background = "rgba(255,255,255,0.2)";
                setTimeout(() => {
                    objectArea.style.background = "rgba(255,255,255,0.05)";
                    initLevel();
                }, 400);
            } else {
                document.getElementById('msg-overlay').style.display = 'flex';
            }
        } else {
            // Error: sacudida visual
            optionsBar.style.transform = "translateX(10px)";
            setTimeout(() => optionsBar.style.transform = "translateX(-10px)", 100);
            setTimeout(() => optionsBar.style.transform = "translateX(0)", 200);
        }
    }

    // Movimiento de Cantutino
    window.addEventListener('mousemove', (e) => {
        cantutino.style.left = (e.clientX - 35) + 'px';
        cantutino.style.top = (e.clientY - 90) + 'px';
        const rot = (e.clientX / window.innerWidth - 0.5) * 40;
        cantutino.style.transform = `rotate(${rot}deg)`;
    });

    initLevel();
</script>

<style>
    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-10px); }
    }
</style>

</body>
</html>
